<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Insight Board｜仕事・IT・AI・社会情勢の今日のまとめ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
  :root{
    --s0:#f3f2ec; --s1:#faf9f4; --s2:#ffffff;
    --tp:#2c2b27; --ts:#615f57; --tm:#8c8a7e;
    --bd:#e8e6dd; --bds:#d8d6cc;
    --acc:#1f6feb; --acc-t:#185fa5; --acc-bg:#e9f1fb;
    --ok-t:#0f6e56; --ok-bg:#e3f4ed;
    --warn-t:#9a4a16; --warn-bg:#fbeede;
    --dang-t:#a32d2d; --dang-bg:#fcecec;
    --pro-t:#3c3489; --pro-bg:#eeedfe;
    --radius:9px;
    --serif:"Shippori Mincho",serif;
    --sans:"Noto Sans JP",-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --s0:#1b1a18; --s1:#232220; --s2:#2a2926;
      --tp:#ece9e0; --ts:#b4b2a7; --tm:#87857b;
      --bd:#37352f; --bds:#49473f;
      --acc:#6ea8f0; --acc-t:#9cc4f5; --acc-bg:#16304c;
      --ok-t:#7fd8b8; --ok-bg:#123a30;
      --warn-t:#efb86a; --warn-bg:#3c2a11;
      --dang-t:#f0a0a0; --dang-bg:#3e1d1d;
      --pro-t:#c4bef2; --pro-bg:#29244f;
    }
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--s0);color:var(--tp);font-family:var(--sans);line-height:1.8;-webkit-font-smoothing:antialiased;letter-spacing:.01em}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1020px;margin:0 auto;padding:0 22px}
  .ti{vertical-align:-2px}

  header.top{background:var(--s2);border-bottom:1px solid var(--bd);padding:26px 0 20px}
  .top-inner{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;flex-wrap:wrap}
  .brand{font-family:var(--serif);font-size:1.7rem;font-weight:700;margin:0;letter-spacing:.03em;color:var(--tp)}
  .sub{font-size:.84rem;color:var(--ts);margin-top:5px}
  .stats{display:flex;gap:7px;margin-top:11px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;color:var(--ts);background:var(--s1);border:1px solid var(--bd);padding:4px 11px;border-radius:30px}
  .pill .ti{font-size:15px}
  .meta{text-align:right;font-size:.82rem}
  .meta .date{font-family:var(--serif);font-size:1.1rem;font-weight:600}
  .updated{display:inline-flex;align-items:center;gap:6px;margin-top:7px;background:var(--acc-bg);color:var(--acc-t);padding:4px 12px;border-radius:30px;font-size:.72rem}
  .datepick{margin-top:11px;display:flex;gap:7px;align-items:center;justify-content:flex-end}
  .datepick label{font-size:.72rem;color:var(--tm)}
  .datepick select{font-size:.78rem;padding:6px 11px;border-radius:var(--radius);border:1px solid var(--bd);background:var(--s2);color:var(--tp);font-family:var(--sans)}
  .archnote{font-size:.76rem;color:var(--warn-t);background:var(--warn-bg);border:1px solid var(--bd);border-radius:var(--radius);padding:9px 14px;margin:14px 0 0;display:none}

  nav.jump{position:sticky;top:0;z-index:30;background:var(--s0);border-bottom:1px solid var(--bd)}
  nav.jump .wrap{display:flex;gap:8px;overflow-x:auto;padding-top:11px;padding-bottom:11px}
  nav.jump a{display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-size:.8rem;color:var(--ts);padding:7px 14px;border-radius:30px;border:1px solid var(--bd);background:var(--s2)}
  nav.jump a:hover{color:var(--acc-t);border-color:var(--acc)}
  nav.jump a .ti{font-size:15px}

  .sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;overflow-y:auto;background:var(--s2);border-right:1px solid var(--bd);padding:20px 14px 28px;display:none;z-index:50}
  .sidebar .sb-brand{font-family:var(--serif);font-size:1rem;font-weight:600;color:var(--tp);padding:4px 10px 0}
  .sidebar .sb-title{font-size:.7rem;color:var(--tm);letter-spacing:.12em;padding:16px 10px 8px}
  .sidebar a{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--radius);font-size:.85rem;color:var(--ts);line-height:1.35;margin-bottom:2px;transition:background .15s,color .15s}
  .sidebar a:hover{background:var(--s1);color:var(--tp)}
  .sidebar a.active{background:var(--acc-bg);color:var(--acc-t);font-weight:500}
  .sidebar a .ti{font-size:18px;flex:none}
  .sidebar .sdot{width:9px;height:9px;border-radius:50%;flex:none}

  .tips{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:20px 22px;margin:24px 0 6px}
  .tips-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .tips-h .ti{font-size:20px;color:var(--acc-t)}
  .tips-h span.lbl{font-size:1.04rem;font-weight:700}
  .tips-h .hint{font-size:.72rem;color:var(--tm)}
  .tiplist{display:flex;flex-direction:column;margin-top:13px}
  .tipitem{display:flex;align-items:center;gap:13px;padding:13px 4px;border-top:1px solid var(--bd);cursor:pointer;transition:.15s}
  .tipitem:first-child{border-top:none}
  .tipitem:hover{background:var(--s1);padding-left:10px;border-radius:10px}
  .tipnum{flex:none;width:27px;height:27px;border-radius:50%;background:var(--acc-bg);color:var(--acc-t);font-weight:500;font-size:.84rem;display:flex;align-items:center;justify-content:center}
  .tiptxt{flex:1;font-size:.92rem;line-height:1.65}
  .tipgo{flex:none;font-size:.76rem;font-weight:500;color:var(--acc-t);white-space:nowrap}

  .filter{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:15px 18px;margin:18px 0 8px}
  .frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:11px}
  .frow:last-child{margin-bottom:0}
  .flab{font-size:.74rem;font-weight:500;color:var(--tm);min-width:46px}
  .srch-wrap{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--bd);border-radius:30px;padding:0 14px}
  .srch-wrap .ti{font-size:17px;color:var(--tm)}
  .search{flex:1;font-size:.88rem;padding:9px 0;border:none;background:transparent;color:var(--tp);font-family:var(--sans)}
  .search:focus{outline:none}
  .chip{font-size:.78rem;font-weight:500;padding:6px 13px;border-radius:30px;border:1px solid var(--bd);background:var(--s2);color:var(--ts);cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--acc)}
  .chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .chip.lv-now.on{background:var(--ok-t);border-color:var(--ok-t)}
  .chip.lv-know.on{background:var(--acc);border-color:var(--acc)}
  .chip.lv-deep.on{background:var(--warn-t);border-color:var(--warn-t)}
  .fclear{font-size:.76rem;color:var(--acc-t);cursor:pointer;font-weight:500;margin-left:auto}
  .fcount{font-size:.74rem;color:var(--tm);margin-left:8px}

  section.block{margin:32px 0 8px;scroll-margin-top:64px}
  #tips{scroll-margin-top:64px}
  .sec-head{display:flex;align-items:center;gap:12px;margin:0 0 5px;flex-wrap:wrap}
  .sec-tile{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
  .sec-tile .ti{font-size:20px}
  .sec-head h2{font-family:var(--serif);margin:0;font-size:1.32rem;font-weight:600;letter-spacing:.02em}
  .sec-head .cnt{font-size:.73rem;color:var(--ts);background:var(--s1);border:1px solid var(--bd);padding:3px 12px;border-radius:30px}
  .sec-desc{color:var(--ts);font-size:.84rem;margin:3px 0 16px}
  .notice{border-radius:12px;padding:12px 16px;margin:0 0 16px;font-size:.84rem;line-height:1.7;border:1px solid var(--bd)}
  .notice .ti{margin-right:6px;font-size:16px}
  .notice.warn{background:var(--dang-bg);color:var(--dang-t)}
  .notice.ok{background:var(--ok-bg);color:var(--ok-t)}
  .notice.info{background:var(--acc-bg);color:var(--acc-t)}
  .notice b{font-weight:700}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--s2);border:1px solid var(--bd);border-radius:14px;padding:18px 19px;display:flex;flex-direction:column;cursor:pointer;transition:border-color .15s,transform .15s}
  .card:hover{transform:translateY(-2px);border-color:var(--bds)}
  .tagrow{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .cat{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:500;padding:3px 11px;border-radius:30px;background:var(--s1);border:1px solid var(--bd);color:var(--ts)}
  .cat .cdot{width:8px;height:8px;border-radius:50%;flex:none}
  .lvl{font-size:.7rem;font-weight:500;padding:3px 10px;border-radius:30px}
  .lvl.now{background:var(--ok-bg);color:var(--ok-t)}
  .lvl.know{background:var(--acc-bg);color:var(--acc-t)}
  .lvl.deep{background:var(--warn-bg);color:var(--warn-t)}
  .card h3{font-family:var(--serif);margin:2px 0 9px;font-size:1.06rem;line-height:1.55;font-weight:600}
  .card p{margin:0 0 13px;font-size:.86rem;color:var(--ts);line-height:1.75}
  .card .chips{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 13px}
  .card .tg{font-size:.7rem;color:var(--tm);background:var(--s1);border:1px solid var(--bd);border-radius:30px;padding:2px 10px}
  .card .tg:hover{color:var(--acc-t);border-color:var(--acc)}
  .cardfoot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;gap:10px;border-top:1px solid var(--bd);padding-top:11px}
  .cardfoot .src{font-size:.72rem;color:var(--tm)}
  .cardfoot .more{font-size:.78rem;font-weight:500;color:var(--acc-t);display:inline-flex;align-items:center;gap:4px}

  footer{margin:42px 0 30px;padding-top:20px;border-top:1px solid var(--bd);color:var(--tm);font-size:.79rem;line-height:1.75}
  footer b{color:var(--ts)}
  .disclaimer{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:13px 16px;margin-top:13px;font-size:.77rem}
  .state{padding:64px 18px;text-align:center;color:var(--tm)}

  .modal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(28,27,25,.5)}
  .modal.open{display:flex}
  .sheet{background:var(--s2);border:1px solid var(--bd);border-radius:18px;max-width:600px;width:100%;max-height:86vh;overflow-y:auto;padding:28px 30px 26px}
  .sheet .mrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:13px}
  .sheet .mclose{margin-left:auto;border:1px solid var(--bd);background:var(--s1);color:var(--ts);width:34px;height:34px;border-radius:50%;font-size:1.05rem;cursor:pointer;line-height:1}
  .sheet .mclose:hover{color:var(--acc-t);border-color:var(--acc)}
  .sheet h3{font-family:var(--serif);font-size:1.4rem;font-weight:700;line-height:1.5;margin:0 0 15px}
  .sheet .mbody{font-size:.95rem;line-height:1.95;color:var(--tp);white-space:pre-wrap}
  .sheet .mtags{display:flex;gap:7px;flex-wrap:wrap;margin:18px 0 0}
  .sheet .mtags .tg{font-size:.74rem;color:var(--acc-t);background:var(--acc-bg);border-radius:30px;padding:3px 12px;cursor:pointer}
  .sheet .mfoot{margin-top:20px;padding-top:15px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
  .sheet .mfoot .ms{font-size:.78rem;color:var(--tm)}
  .sheet .mfoot a{font-size:.78rem;color:var(--acc-t);font-weight:500;border:1px solid var(--bd);padding:7px 14px;border-radius:30px;display:inline-flex;align-items:center;gap:5px}
  .sheet .mfoot a:hover{border-color:var(--acc)}

  @media(min-width:1200px){body{padding-left:240px}.sidebar{display:block}nav.jump{display:none}}
  @media(max-width:560px){.brand{font-size:1.4rem}.meta{text-align:left}.top-inner{align-items:flex-start}.datepick{justify-content:flex-start}.sheet{padding:24px 20px}}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar" aria-label="テーマ一覧"></aside>

<header class="top">
  <div class="wrap top-inner">
    <div>
      <h1 class="brand">Daily Insight Board</h1>
      <div class="sub">仕事・IT・AI・社会情勢の、毎朝の「使える情報」まとめ</div>
      <div class="stats">
        <span class="pill"><i class="ti ti-layout-grid" aria-hidden="true"></i><span id="secCount">—</span> テーマ</span>
        <span class="pill"><i class="ti ti-cards" aria-hidden="true"></i><span id="cardCount">—</span> トピック</span>
      </div>
    </div>
    <div class="meta">
      <div class="date" id="date">—</div>
      <span class="updated" id="updated"><i class="ti ti-refresh" aria-hidden="true"></i>毎朝 7:00 自動更新</span>
      <div class="datepick"><label for="datePick">表示日</label><select id="datePick"><option>最新</option></select></div>
    </div>
  </div>
  <div class="wrap"><div class="archnote" id="archnote"></div></div>
</header>

<nav class="jump"><div class="wrap" id="nav"></div></nav>

<main class="wrap" id="app"><div class="state" id="loading">読み込み中…</div></main>

<div class="modal" id="modal" aria-hidden="true">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="mrow" id="mrow"></div>
    <h3 id="mtitle"></h3>
    <div class="mbody" id="mbody"></div>
    <div class="mtags" id="mtags"></div>
    <div class="mfoot" id="mfoot"></div>
  </div>
</div>

<script>
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const lvlClass = v => (["now","know","deep"].includes(v)?v:"know");
const lvlName = {now:"すぐ使える",know:"知っておく",deep:"深掘り"};
const SECICON = {work:"building-factory",ittools:"tools",subsidy:"cash",events:"calendar-event","ai-copilot":"robot","ai-other":"flask",society:"world"};
const ic = n => '<i class="ti ti-'+n+'" aria-hidden="true"></i>';
function hexA(hex,a){const h=(hex||"#888888").replace("#","");return "rgba("+parseInt(h.substr(0,2),16)+","+parseInt(h.substr(2,2),16)+","+parseInt(h.substr(4,2),16)+","+a+")";}
let DATA=null, CARDS=[], cardById={};
const F={q:"",level:"all",tag:null};

function filterTags(d){
  const m={};(d.sections||[]).forEach(s=>(s.cards||[]).forEach(c=>(c.tags||[]).forEach(t=>{if(t)m[t]=(m[t]||0)+1;})));
  const all=Object.keys(m).sort((a,b)=>m[b]-m[a]);const common=all.filter(t=>m[t]>=2);
  return (common.length>=5?common:all).slice(0,14);
}
function buildNav(d){
  document.getElementById("nav").innerHTML='<a href="#tips">'+ic("sparkles")+' まとめ</a>'+
    (d.sections||[]).map(s=>'<a href="#'+esc(s.id)+'">'+ic(SECICON[s.id]||"point")+' '+esc(s.title)+'</a>').join("");
}
function buildSidebar(d){
  const sb=document.getElementById("sidebar"); if(!sb) return;
  let h='<div class="sb-brand">Daily Insight Board</div><div class="sb-title">テーマ一覧</div>';
  h+='<a href="#tips" data-spy="tips">'+ic("sparkles")+'今日のまとめ</a>';
  h+=(d.sections||[]).map(s=>'<a href="#'+esc(s.id)+'" data-spy="'+esc(s.id)+'"><span class="sdot" style="background:'+esc(s.barColor||"#888888")+'"></span>'+esc(s.title)+'</a>').join("");
  sb.innerHTML=h;
}
function setupSpy(){
  const links={}; document.querySelectorAll('.sidebar a[data-spy]').forEach(a=>links[a.dataset.spy]=a);
  const targets=[document.getElementById("tips")].concat([].slice.call(document.querySelectorAll("section.block"))).filter(Boolean);
  if(window._spy) window._spy.disconnect();
  if(!("IntersectionObserver" in window)) return;
  window._spy=new IntersectionObserver(function(entries){
    entries.forEach(function(e){ e.target._vis=e.isIntersecting; });
    let cur=null; for(var i=0;i<targets.length;i++){ if(targets[i]._vis){ cur=targets[i].id; break; } }
    if(cur){ for(var k in links) links[k].classList.remove("active"); if(links[cur]) links[cur].classList.add("active"); }
  },{rootMargin:"-12% 0px -78% 0px",threshold:0});
  targets.forEach(function(t){ window._spy.observe(t); });
}

function buildBoard(d){
  DATA=d; CARDS=[]; cardById={};
  document.getElementById("date").textContent=d.date||"";
  if(d.updated) document.getElementById("updated").innerHTML=ic("refresh")+esc(d.updated.replace(/^[^　-鿿0-9]+/,"").trim()||d.updated);
  buildNav(d); buildSidebar(d);
  let total=0;(d.sections||[]).forEach(s=>total+=(s.cards||[]).length);
  document.getElementById("secCount").textContent=(d.sections||[]).length;
  document.getElementById("cardCount").textContent=total;
  let html="";

  if(Array.isArray(d.quickTips)&&d.quickTips.length){
    html+='<div class="tips" id="tips"><div class="tips-h">'+ic("bulb")+'<span class="lbl">今日のすぐ使える3トピック</span><span class="hint">タップで要約を表示</span></div><div class="tiplist">';
    html+=d.quickTips.map((t,i)=>{const o=(typeof t==="string")?{text:t,target:null}:t;
      return '<div class="tipitem"'+(o.target?(' data-jump="'+esc(o.target)+'"'):'')+'><span class="tipnum">'+(i+1)+'</span><span class="tiptxt">'+esc(o.text)+'</span>'+(o.target?('<span class="tipgo">要約 '+ic("arrow-right")+'</span>'):'')+'</div>';}).join("");
    html+='</div></div>';
  }

  const tags=filterTags(d);
  html+='<div class="filter">';
  html+='<div class="frow"><span class="srch-wrap">'+ic("search")+'<input class="search" id="q" type="text" placeholder="キーワードで絞り込み（タイトル・本文・タグ）"></span><span class="fcount" id="fcount"></span></div>';
  html+='<div class="frow"><span class="flab">レベル</span><span class="chip lv-all on" data-lv="all">すべて</span><span class="chip lv-now" data-lv="now">すぐ使える</span><span class="chip lv-know" data-lv="know">知っておく</span><span class="chip lv-deep" data-lv="deep">深掘り</span><span class="fclear" id="fclear">条件をクリア</span></div>';
  if(tags.length) html+='<div class="frow"><span class="flab">タグ</span>'+tags.map(t=>'<span class="chip tagchip" data-tag="'+esc(t)+'">'+esc(t)+'</span>').join("")+'</div>';
  html+='</div>';

  (d.sections||[]).forEach(sec=>{
    const color=esc(sec.barColor||"#1f6feb");
    html+='<section class="block" id="'+esc(sec.id)+'" data-sec>';
    html+='<div class="sec-head"><span class="sec-tile" style="background:'+hexA(color,.15)+';color:'+color+'">'+ic(SECICON[sec.id]||"point")+'</span><h2>'+esc(sec.title)+'</h2>';
    if(sec.tag) html+='<span class="cnt">'+esc(sec.tag)+'</span>';
    html+='</div>';
    if(sec.desc) html+='<p class="sec-desc">'+esc(sec.desc)+'</p>';
    if(sec.notice){const nt=["warn","ok","info"].includes(sec.noticeType)?sec.noticeType:"info";const ni=nt==="warn"?"alert-triangle":(nt==="ok"?"circle-check":"info-circle");html+='<div class="notice '+nt+'">'+ic(ni)+sec.notice+'</div>';}
    html+='<div class="grid">';
    (sec.cards||[]).forEach(c=>{
      const idx=CARDS.length; const rec=Object.assign({},c,{_color:color}); CARDS.push(rec);
      if(c.id) cardById[c.id]=rec;
      const tg=(c.tags||[]);
      const text=((c.title||"")+" "+(c.body||"")+" "+(c.detail||"")+" "+(c.cat||"")+" "+tg.join(" ")).toLowerCase();
      const cid=c.id?(' id="'+esc(c.id)+'"'):'';
      html+='<article class="card"'+cid+' data-idx="'+idx+'" data-card data-level="'+lvlClass(c.levelClass)+'" data-tags="'+esc(tg.join("|"))+'" data-text="'+esc(text)+'">';
      html+='<div class="tagrow"><span class="cat"><span class="cdot" style="background:'+color+'"></span>'+esc(c.cat||"")+'</span><span class="lvl '+lvlClass(c.levelClass)+'">'+esc(c.levelText||lvlName[lvlClass(c.levelClass)])+'</span></div>';
      html+='<h3>'+esc(c.title)+'</h3>';
      html+='<p>'+esc(c.body)+'</p>';
      if(tg.length) html+='<div class="chips">'+tg.map(t=>'<span class="tg" data-tag="'+esc(t)+'">#'+esc(t)+'</span>').join("")+'</div>';
      html+='<div class="cardfoot"><span class="src">'+esc(c.source||"")+'</span><span class="more">詳しく '+ic("arrow-right")+'</span></div>';
      html+='</article>';
    });
    html+='</div></section>';
  });

  html+='<footer><p><b>Daily Insight Board</b>｜仕事・IT・AI・社会情勢の「使える情報」を毎朝7:00に自動更新。カードをタップすると、サイト内で要約の詳細を読めます。</p>'
     +'<div class="disclaimer">各項目は公開情報をもとに編集部（自動）が要約しています。重要な判断・対外対応の前には一次情報をご確認ください。規制・法令（化審法・REACH等）や補助金・展示会の日程は更新されます。生成AIの利用は社内規程に従ってください。</div></footer>';

  document.getElementById("app").innerHTML=html;
  bind();
  setupSpy();
  applyFilters();
}

function openDetail(c){
  if(!c) return;
  const color=c._color||"#1f6feb", lc=lvlClass(c.levelClass);
  document.getElementById("mrow").innerHTML=
    '<span class="cat"><span class="cdot" style="background:'+color+'"></span>'+esc(c.cat||"")+'</span>'+
    '<span class="lvl '+lc+'">'+esc(c.levelText||lvlName[lc])+'</span>'+
    '<button class="mclose" id="mclose" aria-label="閉じる">×</button>';
  document.getElementById("mtitle").textContent=c.title||"";
  document.getElementById("mbody").textContent=c.detail||c.body||"";
  const tg=(c.tags||[]);
  document.getElementById("mtags").innerHTML=tg.map(t=>'<span class="tg" data-tag="'+esc(t)+'">#'+esc(t)+'</span>').join("");
  document.getElementById("mfoot").innerHTML='<span class="ms">出典：'+esc(c.source||"—")+'</span>'+(c.url?'<a href="'+esc(c.url)+'" target="_blank" rel="noopener">原文を開く '+ic("external-link")+'</a>':'');
  const m=document.getElementById("modal"); m.classList.add("open"); m.setAttribute("aria-hidden","false"); document.body.style.overflow="hidden";
  document.getElementById("mclose").addEventListener("click",closeModal);
  document.querySelectorAll("#mtags .tg").forEach(el=>el.addEventListener("click",()=>{closeModal();setTag(el.dataset.tag);}));
}
function closeModal(){const m=document.getElementById("modal");m.classList.remove("open");m.setAttribute("aria-hidden","true");document.body.style.overflow="";}

function setTag(t){
  F.tag=(F.tag===t)?null:t;
  document.querySelectorAll(".chip.tagchip").forEach(x=>x.classList.toggle("on",x.dataset.tag===F.tag));
  window.scrollTo({top:0,behavior:"smooth"}); applyFilters();
}
function resetFilters(){
  F.q="";F.level="all";F.tag=null;
  const qi=document.getElementById("q"); if(qi) qi.value="";
  document.querySelectorAll(".chip[data-lv]").forEach(x=>x.classList.toggle("on",x.dataset.lv==="all"));
  document.querySelectorAll(".chip.tagchip").forEach(x=>x.classList.remove("on"));
  applyFilters();
}

function bind(){
  const q=document.getElementById("q");
  if(q){q.value=F.q;q.addEventListener("input",()=>{F.q=q.value.trim().toLowerCase();applyFilters();});}
  document.querySelectorAll(".chip[data-lv]").forEach(el=>el.addEventListener("click",()=>{F.level=el.dataset.lv;document.querySelectorAll(".chip[data-lv]").forEach(x=>x.classList.toggle("on",x.dataset.lv===F.level));applyFilters();}));
  document.querySelectorAll(".chip.tagchip").forEach(el=>el.addEventListener("click",()=>setTag(el.dataset.tag)));
  const fc=document.getElementById("fclear"); if(fc) fc.addEventListener("click",resetFilters);
  document.querySelectorAll("[data-card]").forEach(card=>card.addEventListener("click",()=>openDetail(CARDS[+card.dataset.idx])));
  document.querySelectorAll(".card .tg").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();setTag(el.dataset.tag);}));
  document.querySelectorAll(".tipitem[data-jump]").forEach(el=>el.addEventListener("click",()=>openDetail(cardById[el.dataset.jump])));
  const modal=document.getElementById("modal");
  modal.addEventListener("click",e=>{if(e.target===modal) closeModal();});
}
document.addEventListener("keydown",e=>{if(e.key==="Escape") closeModal();});

function applyFilters(){
  let shown=0;
  document.querySelectorAll("[data-card]").forEach(card=>{
    const okLv=F.level==="all"||card.dataset.level===F.level;
    const okTag=!F.tag||("|"+card.dataset.tags+"|").includes("|"+F.tag+"|");
    const okQ=!F.q||card.dataset.text.includes(F.q);
    const vis=okLv&&okTag&&okQ; card.style.display=vis?"":"none"; if(vis) shown++;
  });
  document.querySelectorAll("[data-sec]").forEach(sec=>{sec.style.display=[...sec.querySelectorAll("[data-card]")].some(c=>c.style.display!=="none")?"":"none";});
  const fcount=document.getElementById("fcount"); if(fcount) fcount.textContent=(F.q||F.tag||F.level!=="all")?("該当 "+shown+" 件"):"";
}

function loadData(file,isArchive,label){
  const url=file+(file.indexOf("?")>=0?"&":"?")+"_="+Date.now();
  fetch(url).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();}).then(d=>{
    buildBoard(d);
    const an=document.getElementById("archnote");
    if(isArchive){an.style.display="block";an.innerHTML="過去のアーカイブ（"+esc(label||"")+"）を表示中。最新に戻すには「表示日」を最新に切り替えてください。";}
    else an.style.display="none";
  }).catch(e=>{document.getElementById("app").innerHTML='<div class="state">データを読み込めませんでした（'+esc(e.message)+'）。しばらくして再読み込みしてください。</div>';});
}
function initDatePicker(){
  fetch("archive/index.json?_="+Date.now()).then(r=>r.ok?r.json():null).then(m=>{
    if(!m||!Array.isArray(m.dates)||!m.dates.length) return;
    const sel=document.getElementById("datePick");const dates=m.dates.slice().sort().reverse();
    sel.innerHTML='<option value="__latest__">最新</option>'+dates.map(d=>'<option value="'+esc(d)+'">'+esc(d)+'</option>').join("");
    sel.addEventListener("change",()=>{if(sel.value==="__latest__")loadData("data.json",false);else loadData("archive/"+sel.value+".json",true,sel.value);});
  }).catch(()=>{});
}
loadData("data.json",false);
initDatePicker();
</script>
</body>
</html>
